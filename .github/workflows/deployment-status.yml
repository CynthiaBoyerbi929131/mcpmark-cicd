name: Deployment Status
on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create_issue.outputs.issue_number }}
      previous_commit: ${{ steps.get_previous_commit.outputs.previous_commit }}
      current_commit: ${{ github.sha }}
      package_version: ${{ steps.get_package_version.outputs.package_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Get previous commit SHA
        id: get_previous_commit
        run: echo "previous_commit=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get_package_version
        run: echo "package_version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              labels: ['deployment', 'in-progress'],
              body: `Deployment in progress for commit: ${context.sha}\nPrevious commit: ${{ steps.get_previous_commit.outputs.previous_commit }}\nPackage version: ${{ steps.get_package_version.outputs.package_version }}`
            });
            return issue.number;
          result-encoding: string
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create_issue.outputs.issue_number }},
              body: "Pre-deployment checks completed"
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact_name: ${{ steps.create_artifact.outputs.artifact_name }}
      checksum: ${{ steps.generate_checksum.outputs.checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Starting rollback process..."

          # Check if previous commit exists
          if ! git rev-parse --verify ${{ needs.pre-deployment.outputs.previous_commit }} > /dev/null 2>&1; then
            echo "Error: Previous commit ${{ needs.pre-deployment.outputs.previous_commit }} not found"
            exit 1
          fi

          # Revert to previous commit
          echo "Reverting to previous commit: ${{ needs.pre-deployment.outputs.previous_commit }}"
          git revert --no-edit ${{ github.sha }}..${{ needs.pre-deployment.outputs.previous_commit }}

          # Restore configuration files
          echo "Restoring configuration files..."
          if [ -f package.json.backup ]; then
            mv package.json.backup package.json
          fi
          if [ -f package-lock.json.backup ]; then
            mv package-lock.json.backup package-lock.json
          fi

          # Reinstall dependencies
          echo "Reinstalling dependencies..."
          npm install

          # Verify rollback
          echo "Verifying rollback..."
          CURRENT_COMMIT=$(git rev-parse HEAD)
          if [ "$CURRENT_COMMIT" != "${{ needs.pre-deployment.outputs.previous_commit }}" ]; then
            echo "Error: Rollback failed. Current commit: $CURRENT_COMMIT"
            exit 1
          fi

          echo "Rollback completed successfully!"
          EOF
          chmod +x rollback.sh

      - name: Create dependency verification script
        run: |
          cat > verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Verifying dependency compatibility..."

          # Check if package.json and package-lock.json are in sync
          npm ci --dry-run > /dev/null 2>&1 || {
            echo "Error: package.json and package-lock.json are not in sync"
            exit 1
          }

          # Check for vulnerable dependencies
          npm audit --audit-level moderate > /dev/null 2>&1 || {
            echo "Warning: Vulnerable dependencies found"
          }

          echo "Dependency verification completed!"
          EOF
          chmod +x verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > ROLLBACK_GUIDE.md << 'EOF'
          # Rollback Guide for Deployment ${{ github.sha }}

          ## Overview
          This guide provides step-by-step instructions to rollback to the previous commit (${{ needs.pre-deployment.outputs.previous_commit }}).

          ## Prerequisites
          - Git installed
          - Node.js ${{ steps.setup-node.outputs.node-version }} installed
          - Access to the repository

          ## Rollback Steps
          1. **Download Rollback Artifact**
             - Download the rollback package from GitHub Actions artifacts: `rollback-package-${{ github.sha }}.zip`

          2. **Extract Artifact**
             ```bash
             unzip rollback-package-${{ github.sha }}.zip
             cd rollback-package-${{ github.sha }}
             ```

          3. **Run Rollback Script**
             ```bash
             ./rollback.sh
             ```

          4. **Verify Rollback**
             ```bash
             ./verify-dependencies.sh
             git rev-parse HEAD # Should show ${{ needs.pre-deployment.outputs.previous_commit }}
             ```

          ## Emergency Rollback
          If the automated script fails, follow these manual steps:
          1. Revert to previous commit: `git revert --no-edit ${{ github.sha }}..${{ needs.pre-deployment.outputs.previous_commit }}`
          2. Restore config files: `mv package.json.backup package.json && mv package-lock.json.backup package-lock.json`
          3. Reinstall dependencies: `npm install`
          4. Verify: `git rev-parse HEAD`

          ## Support
          For issues, contact the DevOps team.
          EOF

      - name: Backup configuration files
        run: |
          cp package.json package.json.backup
          cp package-lock.json package-lock.json.backup
          if [ -f .env.example ]; then
            cp .env.example .env.example.backup
          fi

      - name: Create rollback package
        id: create_artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          mkdir -p $ARTIFACT_NAME
          cp rollback.sh $ARTIFACT_NAME/
          cp verify-dependencies.sh $ARTIFACT_NAME/
          cp ROLLBACK_GUIDE.md $ARTIFACT_NAME/
          cp package.json.backup $ARTIFACT_NAME/
          cp package-lock.json.backup $ARTIFACT_NAME/
          if [ -f .env.example.backup ]; then
            cp .env.example.backup $ARTIFACT_NAME/
          fi
          zip -r $ARTIFACT_NAME.zip $ARTIFACT_NAME/
          echo "artifact_name=$ARTIFACT_NAME.zip" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: generate_checksum
        run: |
          CHECKSUM=$(sha256sum ${{ steps.create_artifact.outputs.artifact_name }} | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_artifact.outputs.artifact_name }}
          path: ${{ steps.create_artifact.outputs.artifact_name }}
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `## 🔄 Rollback Plan Ready

              - Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}
              - Current Commit: ${{ needs.pre-deployment.outputs.current_commit }}
              - Package Version: ${{ needs.pre-deployment.outputs.package_version }}
              - Artifact: ${{ steps.create_artifact.outputs.artifact_name }}

              ✅ Rollback script created
              ✅ Configuration backups completed
              ✅ Dependency verification script created
              ✅ Rollback documentation generated
              ✅ Compressed rollback package created

              ### Quick Rollback Command
              \`\`\`bash
              # Download artifact first, then:
              unzip ${{ steps.create_artifact.outputs.artifact_name }}
              cd rollback-package-${{ github.sha }}
              ./rollback.sh
              \`\`\`

              - Rollback script created: true
              - Configuration backup: true
              - SHA256: ${{ steps.generate_checksum.outputs.checksum }}`
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            // Remove in-progress label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              name: 'in-progress'
            });

            // Add completed label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              labels: ['completed']
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post final comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `## Deployment Completed Successfully

              Rollback artifact details:
              - Artifact Name: ${{ needs.rollback-preparation.outputs.artifact_name }}
              - SHA256 Checksum: ${{ needs.rollback-preparation.outputs.checksum }}

              The deployment tracking issue will now be closed.`
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              state: 'closed'
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}